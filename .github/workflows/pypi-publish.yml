name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Get the code
      - uses: actions/checkout@v4

      # 2. Install uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.12"

      # 3. Inject the version from the Tag
      - name: Set Version
        run: |
          CLEAN_VERSION=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          sed -i "s/^version = \".*\"/version = \"$CLEAN_VERSION\"/" pyproject.toml
          echo "Building version $CLEAN_VERSION"

      # 4. Build the wheel
      - name: Build package
        run: uv build

      # 5. Publish using Trusted Publishing
      - name: Publish package
        run: uv publish